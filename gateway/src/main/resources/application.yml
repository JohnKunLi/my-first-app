server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: consumer-route
          uri: lb://consumer
          predicates:
            - Path=/consumer/**

        - id: service-provider-route
          uri: lb://service-provider
          predicates:
            - Path=/api/**

